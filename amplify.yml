version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # EC2 IP is ephemeral — rotates on stop/start. Once we get an
            # Elastic IP allocated to the instance (the dev AWS account is
            # currently at the EIP cap, so amplify.yml must be edited each
            # time the instance restarts).
            - echo "NEXT_PUBLIC_API_URL=http://107.20.14.246" > .env.local
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
